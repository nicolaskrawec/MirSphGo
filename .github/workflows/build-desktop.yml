name: Build MirSphGo desktop binaries

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: MirSphGo-linux-amd64

          - name: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            output: MirSphGo-windows-amd64.exe

          - name: macos-amd64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
            output: MirSphGo-darwin-amd64

          - name: macos-arm64
            os: macos-15
            goos: darwin
            goarch: arm64
            output: MirSphGo-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/${{ matrix.output }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
